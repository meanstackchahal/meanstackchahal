<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes slideInLeft { 
        from { transform: translateX(-50px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes slideInRight {
        from { transform: translateX(50px); opacity: 0; }
        to { transform: translateX(0); opacity: 1; }
      }
      @keyframes animateRing {
        0% { stroke-dashoffset: 500; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes pulse {
        0%, 100% { r: 85; }
        50% { r: 88; }
      }
      @keyframes numberCount {
        0% { opacity: 0; }
        10% { opacity: 1; }
        100% { opacity: 1; }
      }
      
      .stat-label { font-family: Arial, sans-serif; font-size: 12px; fill: #999; }
      .stat-value { font-family: Arial, sans-serif; font-size: 24px; font-weight: bold; fill: #00ff88; }
      .stat-row { animation: slideInLeft 0.6s ease-out forwards; }
      .ring-circle { animation: animateRing 3s ease-in-out forwards; }
    </style>
    
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff1493;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9370db;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="500" fill="url(#bgGrad)" rx="10"/>
  
  <!-- Title -->
  <text x="200" y="30" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#00ff88">
    GitHub Stats
  </text>
  
  <!-- Centered Rank Ring -->
  <g transform="translate(200, 100)">
    <!-- Background circle -->
    <circle cx="0" cy="0" r="85" fill="#1a1a2e" stroke="#ff1493" stroke-width="2" opacity="0.5"/>
    
    <!-- Animated ring -->
    <circle class="ring-circle" cx="0" cy="0" r="85" fill="none" stroke="url(#ringGrad)" stroke-width="3" 
            stroke-dasharray="500" stroke-linecap="round" opacity="0.9"/>
    
    <!-- Pulsing ring -->
    <circle cx="0" cy="0" r="85" fill="none" stroke="#ff1493" stroke-width="1" opacity="0.3">
      <animate attributeName="r" values="85;90;85" dur="2s" repeatCount="indefinite"/>
    </circle>
    
    <!-- Rank badge -->
    <circle cx="0" cy="0" r="60" fill="#0a0a1a" stroke="#ff1493" stroke-width="2"/>
    <text x="0" y="15" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#ff1493">
      ⭐
    </text>
    <text x="0" y="-5" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#00ff88" font-weight="bold">
      RANK S
    </text>
    <text x="0" y="45" text-anchor="middle" class="stat-label" font-size="11">
      Developer
    </text>
  </g>
  
  <!-- Stats rows -->
  <!-- Row 1 -->
  <g class="stat-row" style="animation-delay: 0.2s;">
    <rect x="30" y="220" width="340" height="50" fill="#1a1a2e" stroke="#ff1493" stroke-width="1" rx="5" opacity="0.6"/>
    <text x="50" y="235" class="stat-label">Total Contributions</text>
    <text x="50" y="260" class="stat-value">2,500+</text>
    <!-- Progress bar -->
    <rect x="220" y="235" width="130" height="8" fill="#0f0f1e" rx="4"/>
    <rect x="220" y="235" width="115" height="8" fill="#00ff88" rx="4" opacity="0.8">
      <animate attributeName="width" values="0;115" dur="1.5s" begin="0.2s"/>
    </rect>
  </g>
  
  <!-- Row 2 -->
  <g class="stat-row" style="animation-delay: 0.4s;">
    <rect x="30" y="290" width="340" height="50" fill="#1a1a2e" stroke="#ff1493" stroke-width="1" rx="5" opacity="0.6"/>
    <text x="50" y="305" class="stat-label">Public Repositories</text>
    <text x="50" y="330" class="stat-value">150+</text>
    <!-- Progress bar -->
    <rect x="220" y="305" width="130" height="8" fill="#0f0f1e" rx="4"/>
    <rect x="220" y="305" width="98" height="8" fill="#da70d6" rx="4" opacity="0.8">
      <animate attributeName="width" values="0;98" dur="1.5s" begin="0.4s"/>
    </rect>
  </g>
  
  <!-- Row 3 -->
  <g class="stat-row" style="animation-delay: 0.6s;">
    <rect x="30" y="360" width="340" height="50" fill="#1a1a2e" stroke="#ff1493" stroke-width="1" rx="5" opacity="0.6"/>
    <text x="50" y="375" class="stat-label">Total Stars Received</text>
    <text x="50" y="400" class="stat-value">5,000+</text>
    <!-- Progress bar -->
    <rect x="220" y="375" width="130" height="8" fill="#0f0f1e" rx="4"/>
    <rect x="220" y="375" width="125" height="8" fill="#9370db" rx="4" opacity="0.8">
      <animate attributeName="width" values="0;125" dur="1.5s" begin="0.6s"/>
    </rect>
  </g>
  
  <!-- Footer decoration -->
  <line x1="50" y1="460" x2="350" y2="460" stroke="#ff1493" stroke-width="1" opacity="0.3"/>
  <text x="200" y="490" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#a0a0a0">
    Updated regularly • Last sync: Today
  </text>
</svg>
